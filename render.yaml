services:
  - type: web
    name: appli-quiz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers --forwarded-allow-ips="*"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: HOST_KEY
        generateValue: true
